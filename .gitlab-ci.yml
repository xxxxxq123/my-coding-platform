# GitLab Pages 部署配置
# 强制部署 frontend 目录下的所有静态文件
pages:
  stage: deploy          # 部署阶段
  image: alpine:latest   # 使用轻量级 Alpine 镜像
  script:
    # 创建 public 目录（GitLab Pages 固定的部署目录）
    - mkdir -p public
    # 把 frontend 目录下的所有文件复制到 public 目录
    - cp -r frontend/* public/
    # 可选：打印目录结构，确认复制成功
    - ls -la public
  artifacts:
    # 指定要部署的文件目录
    paths:
      - public
  # 只在 main/master 分支触发部署
  only:
    - main
    - master